global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'trust-campus-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot Backend Metrics
  - job_name: 'notes-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
    scrape_interval: 10s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'backend'
    metric_relabel_configs:
      - target_label: application
        replacement: 'notes-backend'

  # Docker Container Metrics
  - job_name: 'docker'
    static_configs:
      - targets: ['unix:///var/run/docker.sock']

  # PostgreSQL (via postgres_exporter if added)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 30s

# Alert rules
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Recording rules for performance
recording_rules:
  - interval: 1m
    rules:
      - record: 'job:http_server_requests:rate1m'
        expr: 'sum(rate(http_server_requests_seconds_count[1m])) by (application, uri, method, status)'
      - record: 'job:http_server_requests:p95'
        expr: 'histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, application, uri))'
      - record: 'job:http_server_requests:p99'
        expr: 'histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, application, uri))'
