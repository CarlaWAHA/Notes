# Monitoring & Performance Configuration
# Add this to demo/src/main/resources/application.properties

# === ACTUATOR CONFIGURATION ===
management.endpoints.web.exposure.include=health,info,metrics,prometheus,threaddump,heapdump
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# === PROMETHEUS METRICS ===
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# === MICROMETER TAGGING ===
management.tags.application=notes-backend
management.tags.environment=development

# === CUSTOM METRICS ===
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.logback=true
management.metrics.enable.tomcat=true

# === HTTP TRACING ===
management.trace.http.enabled=true
management.trace.http.include=COOKIE_HEADERS,ERRORS,REQUEST_HEADERS,RESPONSE_HEADERS

# === JAEGER / OPENTELEMETRY ===
otel.sdk.disabled=false
otel.traces.exporter=jaeger
otel.exporter.jaeger.agent.host=localhost
otel.exporter.jaeger.agent.port=6831
otel.service.name=notes-backend
otel.metrics.exporter=prometheus

# === LOGGING CONFIGURATION ===
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# === DATABASE POOL METRICS ===
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# === JVM METRICS ===
-Xmx1024m:
-Xms512m:
-XX:+UseG1GC
-XX:MaxGCPauseMillis=200
-XX:+ParallelRefProcEnabled
-XX:+UnlockDiagnosticVMOptions
-XX:G1SummarizeRSetStatsPeriod=1

# === PERFORMANCE TUNING ===
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=10000
server.http2.enabled=true
