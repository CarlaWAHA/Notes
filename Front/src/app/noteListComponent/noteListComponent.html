<div class="min-h-screen bg-[radial-gradient(circle_at_10%_10%,#fecaca_0%,#ffffff_45%,#fef2f2_100%)]">
  <!-- Header -->
  <nav class="bg-white shadow-md border-b border-red-100">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-slate-900">Gestion des Cours</h1>
      <button
        (click)="logout()"
        type="button"
        class="px-4 py-2 bg-red-600 hover:bg-black text-white rounded-lg transition duration-200 font-medium"
      >
        Déconnexion
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="max-w-6xl mx-auto px-6 py-8">
    <!-- Create Note Form (Admin Only) -->
    <div *ngIf="isAdmin()" class="mb-8">
      <div class="bg-white rounded-lg shadow-md p-6 border border-red-100">
        <h2 class="text-xl font-bold text-slate-900 mb-4">Créer un nouveau cours</h2>
        <form (ngSubmit)="addNote()" class="space-y-4">
          <div>
            <label for="note-title" class="block text-sm font-medium text-slate-700 mb-2">Titre du cours</label>
            <input
              id="note-title"
              name="title"
              [(ngModel)]="newTitle"
              placeholder="Entrez le titre du cours..."
              aria-required="true"
              required
              class="w-full px-4 py-2 border border-red-200 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition"
            />
          </div>
          <div>
            <label for="note-content" class="block text-sm font-medium text-slate-700 mb-2">Description</label>
            <textarea
              id="note-content"
              name="content"
              [(ngModel)]="newContent"
              placeholder="Entrez la description du cours..."
              aria-required="true"
              required
              rows="4"
              class="w-full px-4 py-2 border border-red-200 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none transition resize-none"
            ></textarea>
          </div>
          <button
            type="submit"
            class="w-full bg-red-600 hover:bg-black text-white font-medium py-2 rounded-lg transition duration-200"
          >
            Ajouter le cours
          </button>
        </form>
      </div>
    </div>

    <!-- Status Messages -->
    <div *ngIf="loading" class="mb-6 p-4 bg-blue-50 border border-blue-200 rounded-lg text-blue-800">
      ⏳ Chargement des notes...
    </div>
    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-800" role="alert">
      {{ errorMessage }}
    </div>

    <!-- Courses Table -->
    <div class="bg-white rounded-lg shadow-md border border-red-100 p-6">
      <h2 class="text-2xl font-bold text-slate-900 mb-6">Liste des cours</h2>
      <div *ngIf="notes.length === 0" class="text-center py-12">
        <p class="text-slate-500 text-lg">Aucun cours pour le moment.</p>
      </div>

      <div *ngIf="notes.length > 0" class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>
            <tr class="border-b border-red-100 text-left text-sm uppercase tracking-wide text-red-700">
              <th class="px-4 py-3">Titre</th>
              <th class="px-4 py-3">Description</th>
              <th class="px-4 py-3">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let note of notes" class="border-b border-red-50 align-top">
              <td class="px-4 py-3 font-semibold text-black">{{ note.title }}</td>
              <td class="px-4 py-3 text-sm text-neutral-700">{{ note.content }}</td>
              <td class="px-4 py-3">
                <div class="flex flex-wrap gap-2">
                  <button
                    *ngIf="isAdmin()"
                    type="button"
                    (click)="startEdit(note)"
                    class="rounded-lg bg-amber-100 px-3 py-1 text-sm font-medium text-amber-800 hover:bg-amber-200"
                  >
                    Modifier
                  </button>
                  <button
                    *ngIf="isAdmin()"
                    type="button"
                    (click)="deleteNote(note.id)"
                    class="rounded-lg bg-red-100 px-3 py-1 text-sm font-medium text-red-700 hover:bg-red-200"
                  >
                    Supprimer
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>

        <div *ngIf="isAdmin() && editingId !== null" class="mt-6 rounded-xl border border-amber-200 bg-amber-50 p-4">
          <h3 class="text-lg font-bold text-amber-900">Modifier le cours</h3>
          <div class="mt-3 space-y-3">
            <input
              [(ngModel)]="editingTitle"
              placeholder="Titre"
              class="w-full rounded-lg border border-amber-200 px-3 py-2 outline-none focus:ring-2 focus:ring-amber-300"
            />
            <textarea
              [(ngModel)]="editingContent"
              rows="4"
              placeholder="Description"
              class="w-full rounded-lg border border-amber-200 px-3 py-2 outline-none focus:ring-2 focus:ring-amber-300"
            ></textarea>
            <div class="flex gap-2">
              <button (click)="saveEdit()" class="rounded-lg bg-amber-600 px-4 py-2 text-sm font-semibold text-white hover:bg-amber-700">Enregistrer</button>
              <button (click)="cancelEdit()" class="rounded-lg border border-amber-300 px-4 py-2 text-sm font-semibold text-amber-800 hover:bg-amber-100">Annuler</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
