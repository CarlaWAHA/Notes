<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100">
  <!-- Header -->
  <nav class="bg-white shadow-md border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-slate-900">📝 Notes App</h1>
      <button 
        (click)="logout()" 
        type="button" 
        class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition duration-200 font-medium"
      >
        Déconnexion
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="max-w-6xl mx-auto px-6 py-8">
    <!-- Create Note Form (Admin Only) -->
    <div *ngIf="isAdmin()" class="mb-8">
      <div class="bg-white rounded-lg shadow-md p-6 border border-slate-200">
        <h2 class="text-xl font-bold text-slate-900 mb-4">➕ Créer une nouvelle note</h2>
        <form (ngSubmit)="addNote()" class="space-y-4">
          <div>
            <label for="note-title" class="block text-sm font-medium text-slate-700 mb-2">Titre</label>
            <input 
              id="note-title" 
              name="title" 
              [(ngModel)]="newTitle" 
              placeholder="Entrez le titre de la note..."
              aria-required="true" 
              required 
              class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            />
          </div>
          <div>
            <label for="note-content" class="block text-sm font-medium text-slate-700 mb-2">Contenu</label>
            <textarea 
              id="note-content" 
              name="content" 
              [(ngModel)]="newContent" 
              placeholder="Entrez le contenu de la note..."
              aria-required="true" 
              required 
              rows="4"
              class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition resize-none"
            ></textarea>
          </div>
          <button 
            type="submit" 
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition duration-200"
          >
            Ajouter une note
          </button>
        </form>
      </div>
    </div>

    <!-- Status Messages -->
    <div *ngIf="loading" class="mb-6 p-4 bg-blue-50 border border-blue-200 rounded-lg text-blue-800">
      ⏳ Chargement des notes...
    </div>
    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-800" role="alert">
      ⚠️ {{ errorMessage }}
    </div>

    <!-- Notes Grid -->
    <div>
      <h2 class="text-2xl font-bold text-slate-900 mb-6">📚 Vos notes</h2>
      <div *ngIf="notes.length === 0" class="text-center py-12">
        <p class="text-slate-500 text-lg">Aucune note pour le moment.</p>
      </div>
      
      <div *ngIf="notes.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div *ngFor="let note of notes" class="bg-white rounded-lg shadow-md hover:shadow-lg transition duration-200 overflow-hidden border border-slate-200">
          <div class="p-6">
            <h3 class="text-lg font-bold text-slate-900 mb-2 line-clamp-2">{{ note.title }}</h3>
            <p class="text-slate-600 text-sm mb-4 line-clamp-3 min-h-12">{{ note.content }}</p>
            <div class="flex gap-2">
              <a 
                [routerLink]="['/notes', note.id]"
                class="flex-1 text-center px-3 py-2 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-lg transition duration-200 font-medium text-sm"
              >
                👁️ Voir
              </a>
              <button 
                *ngIf="isAdmin()" 
                type="button" 
                (click)="deleteNote(note.id)"
                class="flex-1 px-3 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg transition duration-200 font-medium text-sm"
              >
                🗑️ Supprimer
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
