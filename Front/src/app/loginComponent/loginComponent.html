<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-lg shadow-2xl p-8 border border-slate-200">
      <div class="text-center mb-8">
        <div class="text-5xl mb-3">📝</div>
        <h1 class="text-3xl font-bold text-slate-900">Notes App</h1>
        <p class="text-slate-600 mt-2">Gestionnaire de notes sécurisé</p>
      </div>

      <form (ngSubmit)="submit()" #loginForm="ngForm" class="space-y-5">

        <div>
          <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Email ou Nom d'utilisateur</label>
          <input
            type="text"
            id="username"
            [(ngModel)]="model.username"
            name="username"
            placeholder="admin@notes.com"
            aria-required="true"
            required
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition bg-slate-50 hover:bg-white"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Mot de passe</label>
          <input
            type="password"
            id="password"
            [(ngModel)]="model.password"
            name="password"
            placeholder="••••••••"
            aria-required="true"
            required
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition bg-slate-50 hover:bg-white"
          />
        </div>

        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold py-3 rounded-lg transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center"
        >
          <span *ngIf="!isLoading">Se connecter</span>
          <span *ngIf="isLoading">⏳ Connexion en cours...</span>
        </button>

        <div *ngIf="errorMessage" class="bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded-lg" role="alert">
          <p class="font-semibold">❌ Erreur</p>
          <p class="text-sm mt-1">{{ errorMessage }}</p>
        </div>

      </form>

      <div class="mt-8 pt-6 border-t border-slate-200">
        <p class="text-xs text-slate-500 text-center mb-3">Compte de démonstration</p>
        <div class="bg-blue-50 rounded-lg p-4 border border-blue-200">
          <p class="text-sm text-blue-900"><strong>Email:</strong> admin@notes.com</p>
          <p class="text-sm text-blue-900"><strong>Mot de passe:</strong> 12345678</p>
        </div>
      </div>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">
      © 2026 Notes App. Tous droits réservés.
    </p>
  </div>
</div>
