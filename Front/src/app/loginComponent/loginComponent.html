<div class="space-y-5">
  <div class="text-center">
    <h2 class="text-2xl font-black text-black">Connexion a votre espace</h2>
    <p class="mt-1 text-sm text-neutral-600">Accedez au tableau admin ou etudiant selon votre role.</p>
  </div>

  <form (ngSubmit)="submit()" #loginForm="ngForm" class="space-y-4">
    <div>
      <label for="username" class="mb-2 block text-sm font-semibold text-neutral-800">Email ou nom d'utilisateur</label>
      <input
        type="text"
        id="username"
        [(ngModel)]="model.username"
        name="username"
        placeholder="admin@trust.com"
        aria-required="true"
        required
        class="w-full rounded-xl border border-red-200 bg-red-50/40 px-4 py-3 outline-none transition focus:border-red-500 focus:ring-2 focus:ring-red-200"
      />
    </div>

    <div>
      <label for="password" class="mb-2 block text-sm font-semibold text-neutral-800">Mot de passe</label>
      <input
        type="password"
        id="password"
        [(ngModel)]="model.password"
        name="password"
        placeholder="••••••••"
        aria-required="true"
        required
        class="w-full rounded-xl border border-red-200 bg-red-50/40 px-4 py-3 outline-none transition focus:border-red-500 focus:ring-2 focus:ring-red-200"
      />
    </div>

    <button
      type="submit"
      [disabled]="isLoading"
      class="flex w-full items-center justify-center rounded-xl bg-red-600 py-3 font-semibold text-white transition hover:bg-black disabled:cursor-not-allowed disabled:opacity-50"
    >
      <span *ngIf="!isLoading">Se connecter</span>
      <span *ngIf="isLoading">Connexion en cours...</span>
    </button>

    <div *ngIf="errorMessage" class="rounded-xl border border-red-300 bg-red-50 px-4 py-3 text-red-700" role="alert">
      <p class="font-semibold">Erreur</p>
      <p class="mt-1 text-sm">{{ errorMessage }}</p>
    </div>
  </form>

  <div class="rounded-xl border border-red-100 bg-red-50/70 p-4">
    <p class="mb-2 text-xs font-semibold uppercase tracking-wide text-red-700">Compte de demonstration</p>
    <p class="text-sm text-neutral-800"><strong>Email:</strong> admin@trust.com</p>
    <p class="text-sm text-neutral-800"><strong>Mot de passe:</strong> 12345678</p>
  </div>
</div>
