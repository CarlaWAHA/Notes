name: CI CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        run: mvn test --file demo/pom.xml

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: demo/target/site/jacoco

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Front/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Front

      - name: Run frontend tests with coverage
        run: npm run test:coverage
        working-directory: Front

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lcov-report
          path: Front/coverage/lcov-report

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Start backend
        run: |
          mvn spring-boot:run --file demo/pom.xml &
          sleep 20

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Front/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Front

      - name: Start frontend
        run: |
          npm run start -- --host 0.0.0.0 --port 4200 &
          sleep 30
        working-directory: Front

      - name: Run E2E tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: Front
          install: false
          browser: chrome
          spec: cypress/e2e/app/**/*.cy.ts
          config: baseUrl=http://localhost:4200

  build-backend:
    runs-on: ubuntu-latest
    needs: test-e2e

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        run: mvn package -DskipTests=true --file demo/pom.xml

      - name: Upload backend JAR file
        uses: actions/upload-artifact@v4
        with:
          name: backend.jar
          path: demo/target/*.jar

  build-frontend:
    runs-on: ubuntu-latest
    needs: test-e2e

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Front/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Front

      - name: Build frontend
        run: npm run build
        working-directory: Front

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Front/dist

  docker-backend:
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - uses: actions/checkout@v4

      - name: Download backend JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: backend.jar
          path: demo/target

      - name: Build backend Docker image
        run: docker build -t notes-backend:latest ./demo

  docker-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: Front/dist

      - name: Build frontend Docker image
        run: docker build -t notes-frontend:latest ./Front